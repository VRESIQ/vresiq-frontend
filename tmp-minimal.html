<!DOCTYPE html><html><head><meta charset="utf-8"><title>Resume</title><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"><style>.medium-loader-container { min-height: 100vh; width: 100%; display: flex; justify-content: center; align-items: center; background: var(--paper, #fffef9); transition: background 0.3s; }
.medium-loader-card { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 24px; border-radius: 16px; background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(17, 20, 16, 0.05); backdrop-filter: blur(8px); width: 100%; max-width: 280px; text-align: center; animation: 0.3s ease-out 0s 1 normal none running mediumFadeIn; }

.spinner-small { width: 24px; height: 24px; border-width: 2px; border-style: solid; border-right-color: rgba(17, 20, 16, 0.08); border-bottom-color: rgba(17, 20, 16, 0.08); border-left-color: rgba(17, 20, 16, 0.08); border-image: initial; border-top-color: var(--accent-dark, #648c00); border-radius: 50%; animation: 0.8s linear 0s infinite normal none running mediumSpin; }
[data-theme="dark"] .spinner-small { border-right-color: rgba(255, 255, 255, 0.1); border-bottom-color: rgba(255, 255, 255, 0.1); border-left-color: rgba(255, 255, 255, 0.1); border-top-color: var(--accent, #b8ff2c); }
.medium-loader-text { font-size: 0.82rem; color: var(--muted, #697067); margin: 0px; font-weight: 500; }
@keyframes mediumFadeIn { 
  0% { opacity: 0; transform: scale(0.95); }
  100% { opacity: 1; transform: scale(1); }
}
@keyframes mediumSpin { 
  100% { transform: rotate(360deg); }
}
.theme-toggle { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--line); background: var(--wash); color: var(--ink); cursor: pointer; font-size: 1rem; line-height: 1; transition: background 0.2s, transform 0.15s, border-color 0.2s; flex-shrink: 0; }
.theme-toggle:hover { background: var(--wash-2); border-color: rgba(17, 20, 16, 0.2); transform: rotate(15deg) scale(1.05); }
[data-theme="dark"] .theme-toggle { border-color: rgba(232, 230, 220, 0.15); color: rgb(255, 224, 130); background: rgba(255, 255, 255, 0.06); }
[data-theme="dark"] .theme-toggle:hover { border-color: rgba(232, 230, 220, 0.3); color: rgb(255, 213, 79); background: rgba(255, 255, 255, 0.1); }
.home-container { min-height: 100vh; color: var(--ink); overflow-x: hidden; }
.home-nav { position: sticky; top: 0px; z-index: 50; display: flex; align-items: center; justify-content: space-between; height: 72px; padding: 0px clamp(1.25rem, 4vw, 4rem); background: rgba(255, 254, 249, 0.82); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(17, 20, 16, 0.08); transition: box-shadow 0.3s; }
.home-nav:hover { box-shadow: rgba(17, 20, 16, 0.06) 0px 4px 32px; }
.nav-logo { text-decoration: none; font-size: 1.15rem; font-weight: 760; color: var(--ink); letter-spacing: -0.01em; transition: opacity 0.2s; }
.nav-logo:hover { opacity: 0.72; }
.nav-logo-r { color: var(--accent-dark); font-style: italic; }
.nav-links { display: flex; align-items: center; gap: clamp(0.8rem, 2vw, 1.5rem); }
.nav-link { font-size: 0.9rem; font-weight: 560; color: var(--ink); text-decoration: none; position: relative; padding-bottom: 2px; transition: color 0.2s; }
.nav-link::after { content: ""; position: absolute; bottom: 0px; left: 0px; width: 0px; height: 1.5px; background: var(--accent-dark); transition: width 0.22s; }
.nav-link:hover::after { width: 100%; }
.nav-btn { padding: 0.6rem 1.1rem; text-decoration: none; font-size: 0.88rem; font-weight: 650; border-radius: var(--radius); transition: transform 0.15s, box-shadow 0.15s; }
.nav-btn:hover { transform: translateY(-1px); box-shadow: rgba(17, 20, 16, 0.12) 0px 4px 14px; }
.hero-section { min-height: calc(-72px + 100vh); display: grid; grid-template-columns: minmax(0px, 1.1fr) minmax(300px, 0.9fr); align-items: center; gap: clamp(2rem, 5vw, 5rem); padding: clamp(5.5rem, 8vw, 8.5rem) clamp(1.25rem, 5vw, 5rem); max-width: 1440px; margin: 0px auto; }
@media (max-height: 800px) and (max-width: 767px) {
  .hero-section { min-height: auto; padding-top: clamp(2rem, 4vw, 4rem); padding-bottom: clamp(2rem, 4vw, 4rem); }
}
.hero-content { max-width: 680px; animation: 0.7s ease 0s 1 normal both running heroFadeUp; }
@keyframes heroFadeUp { 
  0% { opacity: 0; transform: translateY(24px); }
  100% { opacity: 1; transform: translateY(0px); }
}
.hero-kicker { color: var(--accent-dark); text-transform: uppercase; letter-spacing: 0.14em; font-size: 0.72rem; font-weight: 780; margin-bottom: 1.2rem; }
.hero-title { color: var(--ink); font-size: clamp(2.8rem, 6.5vw, 6.4rem); line-height: 0.96; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 1.4rem; }
.hero-title-gradient { background: linear-gradient(115deg, rgb(17, 17, 17) 0%, rgb(58, 112, 0) 30%, rgb(184, 255, 44) 55%, rgb(58, 112, 0) 75%, rgb(17, 17, 17) 100%) 0% 0% / 250% text; -webkit-text-fill-color: transparent; animation: 4s linear 0s infinite normal none running gradientShift; color: rgb(58, 112, 0); }
@keyframes gradientShift { 
  0% { background-position: 0% center; }
  100% { background-position: 200% center; }
}
.hero-subtitle { max-width: 560px; color: var(--muted); font-size: clamp(0.95rem, 1.3vw, 1.15rem); line-height: 1.7; margin-bottom: 2rem; }

.hero-btn.secondary-lg { background: transparent; color: var(--ink); border-color: var(--ink); }
.hero-btn.secondary-lg:hover { transform: translateY(-2px); background: rgba(17, 20, 16, 0.04); }
.hero-proof { display: flex; flex-wrap: wrap; gap: 0.55rem; }
.hero-proof span { border: 1px solid var(--line); border-radius: 999px; padding: 0.35rem 0.7rem; color: var(--muted); background: rgba(255, 254, 249, 0.7); font-size: 0.76rem; font-weight: 560; transition: border-color 0.2s; }
.hero-proof span:hover { border-color: var(--accent-dark); }
.hero-visual { display: grid; place-items: center; min-width: 0px; }
.resume-product-frame { position: relative; width: min(100%, 480px); aspect-ratio: 0.78 / 1; display: grid; place-items: center; transition: transform 0.45s cubic-bezier(0.23, 1, 0.32, 1); transform-style: preserve-3d; will-change: transform; }
.card-glow { position: absolute; inset: 5% -6% 8% 18%; background: var(--accent); border-radius: 999px; filter: blur(55px); opacity: 0.28; z-index: 0; animation: 6s ease-in-out 0s infinite normal none running glowPulse; }
@keyframes glowPulse { 
  0%, 100% { opacity: 0.28; transform: scale(1); }
  50% { opacity: 0.36; transform: scale(1.04); }
}
.resume-paper { position: relative; z-index: 1; width: 87%; min-height: 86%; padding: clamp(1.2rem, 3vw, 1.8rem); background: rgb(255, 255, 255); border: 1px solid var(--line); border-radius: 4px; box-shadow: rgba(0, 0, 0, 0.04) 0px 2px 4px, rgba(0, 0, 0, 0.08) 0px 8px 32px, rgba(0, 0, 0, 0.05) 0px 24px 64px; animation: 0.9s cubic-bezier(0.23, 1, 0.32, 1) 0.15s 1 normal both running cardFloat; }
@keyframes cardFloat { 
  0% { opacity: 0; transform: translateY(36px) scale(0.97); }
  100% { opacity: 1; transform: translateY(0px) scale(1); }
}
.resume-paper-top { display: flex; justify-content: space-between; gap: 1rem; align-items: flex-start; margin-bottom: 1.2rem; }
.paper-name { font-size: clamp(1.2rem, 2.4vw, 1.85rem); font-weight: 800; line-height: 1; letter-spacing: -0.02em; }
.paper-role { margin-top: 0.5rem; color: var(--accent-dark); font-size: 0.82rem; font-weight: 660; letter-spacing: 0.04em; }
.paper-avatar { display: grid; place-items: center; width: 50px; height: 50px; border-radius: 50%; background: var(--ink); color: rgb(255, 255, 255); font-size: 0.75rem; font-weight: 800; flex-shrink: 0; }

.paper-label { margin-bottom: 0.65rem; font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); font-weight: 780; }
.skill-bar { height: 7px; background: var(--wash); border-radius: 999px; overflow: hidden; margin-bottom: 0.65rem; }
.skill-bar span { display: block; height: 100%; background: var(--accent); animation: 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.6s 1 normal both running barGrow; transform-origin: left center; }
@keyframes barGrow { 
  0% { transform: scaleX(0); }
  100% { transform: scaleX(1); }
}
[data-theme="dark"] .resume-paper { background: rgb(255, 255, 255) !important; border-color: rgba(17, 20, 16, 0.1) !important; }

[data-theme="dark"] .paper-line { background: rgb(232, 231, 223) !important; }

.floating-stat { position: absolute; z-index: 2; right: -2%; bottom: 14%; min-width: 108px; padding: 0.8rem 1rem; border: 1px solid var(--line); border-radius: var(--radius); background: rgba(255, 254, 249, 0.94); box-shadow: rgba(0, 0, 0, 0.1) 0px 4px 24px; animation: 0.8s cubic-bezier(0.23, 1, 0.32, 1) 0.7s 1 normal both running badgeIn; }

.features-section { padding: clamp(5rem, 9vw, 8rem) clamp(1.25rem, 5vw, 5rem); border-top: 1px solid var(--line); background: rgb(255, 253, 245); }
.section-heading { max-width: 900px; margin: 0px auto clamp(2.5rem, 5vw, 4.5rem); text-align: center; }

.fade-in-up { animation: 0.6s ease 0s 1 normal both running heroFadeUp; }
.cta-section { padding: clamp(5rem, 9vw, 8rem) clamp(1.25rem, 5vw, 5rem); background: var(--ink); color: rgb(255, 255, 255); text-align: center; position: relative; overflow: hidden; }
.cta-section::before { content: ""; position: absolute; inset: 0px; background-image: repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.03) 0px, rgba(255, 255, 255, 0.03) 1px, transparent 1px, transparent 60px), repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.03) 0px, rgba(255, 255, 255, 0.03) 1px, transparent 1px, transparent 60px); pointer-events: none; }
.cta-inner { position: relative; z-index: 1; }

.home-footer { padding: 1.5rem clamp(1.25rem, 5vw, 5rem); background: var(--ink); color: rgba(255, 255, 255, 0.72); border-top: 1px solid rgba(255, 255, 255, 0.08); }

@media (max-width: 767px) {

@keyframes fadeIn { 
  0% { opacity: 0; }

}

:root { --ink: #111410; --muted: #697067; --line: rgba(17, 20, 16, 0.1); --paper: #fffef9; --wash: #f4f2ea; --wash-2: #ebe8dd; --accent: #b8ff2c; --accent-dark: #648c00; --danger: #ba2b2b; --radius: 8px; --shadow: 0 18px 60px rgba(17, 20, 16, 0.08); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
html { scroll-behavior: smooth; background: var(--paper); }
body { background: var(--paper); color: var(--ink); }
a { color: inherit; }
button, input, textarea { font: inherit; }
